{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h2 class="section-title mb-1">Add Payment Entry</h2>
        <p class="text-muted mb-0">Invoice INV-{{ invoice.id }}</p>
    </div>
    <a class="btn btn-outline-secondary btn-sm" href="/sales/receipt/{{ invoice.id }}/">Back to Invoice</a>
</div>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            {% for field in form %}
                <div class="col-md-6">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small">{{ field.errors|striptags }}</div>{% endif %}
                </div>
            {% endfor %}
            <div class="col-12">
                <button class="btn btn-primary" type="submit">Save Entry</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
