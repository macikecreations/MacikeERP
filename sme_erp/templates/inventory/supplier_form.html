{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-header"><h5 class="mb-0">Create Supplier Profile</h5></div>
    <div class="card-body">
        <p class="text-muted">Maintain supplier records for procurement and stock traceability.</p>
        <form method="post" class="row g-3">
            {% csrf_token %}
            {% for field in form %}
                <div class="col-md-6">
                    <label class="form-label">{{ field.label }}{% if field.field.required %} <span class="text-danger">*</span>{% endif %}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small">{{ field.errors|striptags }}</div>{% endif %}
                </div>
            {% endfor %}
            <div class="col-12">
                <button class="btn btn-primary" type="submit">Save Supplier</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
