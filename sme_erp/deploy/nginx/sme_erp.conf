# HTTP only â€” after `certbot --nginx`, Certbot adds a second `server` for :443
# and usually redirects HTTPâ†’HTTPS. Re-run `nginx -t` after any manual edits.

server {
    listen 80;
    server_name macike.space www.macike.space;

    # Increase if users upload larger files.
    client_max_body_size 20M;

    # Must match Django STATIC_ROOT (collectstatic output), not STATICFILES_DIRS.
    location /static/ {
        alias /var/www/sme_erp/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # Reverse proxy to Gunicorn (UNIX socket).
    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn-sme_erp.sock;
    }
}
